<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>摩天轮舆情监控中心</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--card:#14141f;--border:#1e1e2e;
  --text:#e0e0e8;--text2:#8888a0;
  --high:#ff2d55;--mid:#ff9500;--low:#30d158;--none:#636366;
  --accent:#3b82f6;
}
body{
  font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;
  background-image:
    linear-gradient(rgba(59,130,246,.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(59,130,246,.03) 1px,transparent 1px);
  background-size:40px 40px;
}
header{
  display:flex;justify-content:space-between;align-items:center;
  padding:16px 32px;border-bottom:1px solid var(--border);
  background:rgba(10,10,15,.8);backdrop-filter:blur(12px);
  position:sticky;top:0;z-index:100;
}
.brand{font-size:20px;font-weight:700;display:flex;align-items:center;gap:10px}
.brand span{
  background:linear-gradient(135deg,var(--accent),#a855f7);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  text-shadow:0 0 30px rgba(59,130,246,.3);
}
.header-right{display:flex;align-items:center;gap:16px;color:var(--text2);font-size:13px}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.status-dot.idle{background:var(--none)}
.status-dot.running{background:var(--accent);animation:pulse 1.5s infinite}
.status-dot.done{background:var(--low)}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(59,130,246,.4)}50%{opacity:.7;box-shadow:0 0 0 6px rgba(59,130,246,0)}}
main{max-width:1200px;margin:0 auto;padding:32px 24px}
.card{
  background:rgba(20,20,31,.7);border:1px solid var(--border);
  border-radius:12px;backdrop-filter:blur(8px);
  padding:32px;margin-bottom:24px;
}
/* 上传区 */
.upload-zone{
  border:2px dashed var(--border);border-radius:12px;padding:60px 20px;
  text-align:center;cursor:pointer;transition:all .3s;
}
.upload-zone:hover,.upload-zone.dragover{
  border-color:var(--accent);background:rgba(59,130,246,.05);
  box-shadow:0 0 30px rgba(59,130,246,.1);
}
.upload-zone .icon{font-size:48px;margin-bottom:16px;opacity:.6}
.upload-zone p{color:var(--text2);font-size:14px;margin-top:8px}
.file-info{margin-top:16px;font-size:13px;color:var(--accent);display:none}
.btn{
  display:inline-block;padding:12px 32px;border:none;border-radius:8px;
  font-size:15px;font-weight:500;cursor:pointer;transition:all .2s;
  font-family:'Noto Sans SC',sans-serif;color:#fff;
}
.btn:hover{transform:scale(1.03)}
.btn-primary{background:linear-gradient(135deg,var(--accent),#6366f1)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.upload-actions{margin-top:24px;display:none}
/* 分析中 */
.analyze-wrap{display:flex;flex-direction:column;align-items:center;gap:24px}
.progress-ring{position:relative;width:140px;height:140px}
.progress-ring svg{transform:rotate(-90deg)}
.progress-ring circle{fill:none;stroke-width:6}
.progress-ring .bg{stroke:var(--border)}
.progress-ring .fg{stroke:var(--accent);stroke-linecap:round;transition:stroke-dashoffset .4s}
.progress-text{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:600;
}
.current-title{color:var(--text2);font-size:14px;max-width:500px;text-align:center;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.log-box{
  width:100%;max-height:200px;overflow-y:auto;background:#0c0c14;
  border-radius:8px;padding:12px 16px;font-family:'JetBrains Mono',monospace;
  font-size:12px;color:var(--text2);line-height:1.8;
}
.log-box::-webkit-scrollbar{width:4px}
.log-box::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
/* 统计卡片 */
.stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-bottom:24px}
.stat-card{
  background:rgba(20,20,31,.7);border:1px solid var(--border);border-radius:10px;
  padding:20px;text-align:center;backdrop-filter:blur(8px);
  animation:fadeUp .5s ease both;
}
.stat-card:nth-child(2){animation-delay:.1s}
.stat-card:nth-child(3){animation-delay:.2s}
.stat-card:nth-child(4){animation-delay:.3s}
.stat-card:nth-child(5){animation-delay:.4s}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.stat-num{font-family:'JetBrains Mono',monospace;font-size:32px;font-weight:600}
.stat-label{font-size:12px;color:var(--text2);margin-top:4px}
.stat-card.high .stat-num{color:var(--high)}
.stat-card.mid .stat-num{color:var(--mid)}
.stat-card.low .stat-num{color:var(--low)}
/* 表格 */
.table-wrap{
  background:rgba(20,20,31,.7);border:1px solid var(--border);border-radius:12px;
  overflow:hidden;backdrop-filter:blur(8px);
}
table{width:100%;border-collapse:collapse;font-size:13px}
thead{background:rgba(30,30,46,.8)}
th{padding:12px 14px;text-align:left;font-weight:500;color:var(--text2);
  border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:10px 14px;border-bottom:1px solid rgba(30,30,46,.5)}
tbody tr{cursor:pointer;transition:background .2s}
tbody tr:hover{background:rgba(59,130,246,.05)}
.risk-badge{
  display:inline-flex;align-items:center;gap:6px;padding:3px 10px;
  border-radius:20px;font-size:12px;font-weight:500;
}
.risk-badge::before{content:'';width:6px;height:6px;border-radius:50%}
.risk-badge.high{background:rgba(255,45,85,.12);color:var(--high)}
.risk-badge.high::before{background:var(--high);box-shadow:0 0 6px var(--high)}
.risk-badge.mid{background:rgba(255,149,0,.12);color:var(--mid)}
.risk-badge.mid::before{background:var(--mid)}
.risk-badge.low{background:rgba(48,209,88,.12);color:var(--low)}
.risk-badge.low::before{background:var(--low)}
.risk-badge.none{background:rgba(99,99,102,.12);color:var(--none)}
.risk-badge.none::before{background:var(--none)}
.influence-bar{
  width:80px;height:6px;background:var(--border);border-radius:3px;overflow:hidden;
  display:inline-block;vertical-align:middle;margin-right:6px;
}
.influence-bar-inner{height:100%;border-radius:3px;background:var(--accent);transition:width .3s}
.detail-row{display:none}
.detail-row td{padding:16px 20px;background:rgba(10,10,15,.5)}
.detail-content{font-size:13px;line-height:1.8;color:var(--text2)}
.detail-content h4{color:var(--text);margin:12px 0 6px;font-size:13px}
.detail-content pre{
  background:#0c0c14;padding:12px;border-radius:6px;white-space:pre-wrap;
  font-family:'JetBrains Mono',monospace;font-size:12px;margin-top:4px;
}
.copy-btn{
  font-size:12px;padding:4px 12px;border:1px solid var(--border);
  background:transparent;color:var(--text2);border-radius:4px;cursor:pointer;
  margin-left:8px;transition:all .2s;
}
.copy-btn:hover{border-color:var(--accent);color:var(--accent)}
.bottom-bar{display:flex;justify-content:center;gap:12px;margin-top:24px}
.status-btn{
  font-size:11px;padding:3px 10px;border-radius:12px;border:none;cursor:pointer;
  font-family:'Noto Sans SC',sans-serif;font-weight:500;transition:all .2s;white-space:nowrap;
}
.status-btn.s0{background:rgba(99,99,102,.15);color:var(--text2)}
.status-btn.s1{background:rgba(59,130,246,.15);color:var(--accent)}
.status-btn.s2{background:rgba(48,209,88,.15);color:var(--low)}
.status-btn.s3{background:rgba(255,149,0,.15);color:var(--mid)}
/* Toast */
.toast{
  position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--accent);color:#fff;padding:10px 24px;border-radius:8px;
  font-size:13px;opacity:0;transition:all .3s;pointer-events:none;z-index:999;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:768px){
  .stats-row{grid-template-columns:repeat(2,1fr)}
  table{font-size:12px}
  th,td{padding:8px 10px}
}
/* 历史记录 */
.history-section{margin-top:8px}
.history-section h3{font-size:15px;font-weight:500;margin-bottom:12px;color:var(--text2)}
.history-list{display:flex;flex-direction:column;gap:8px}
.history-item{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 18px;background:rgba(20,20,31,.5);border:1px solid var(--border);
  border-radius:8px;cursor:pointer;transition:all .2s;
}
.history-item:hover{border-color:var(--accent);background:rgba(59,130,246,.05)}
.history-meta{display:flex;flex-direction:column;gap:4px}
.history-name{font-size:13px;font-weight:500}
.history-time{font-size:11px;color:var(--text2)}
.history-tags{display:flex;gap:6px;align-items:center}
.history-tag{
  font-size:11px;padding:2px 8px;border-radius:10px;
  font-family:'JetBrains Mono',monospace;
}
.history-tag.high{background:rgba(255,45,85,.12);color:var(--high)}
.history-tag.mid{background:rgba(255,149,0,.12);color:var(--mid)}
.history-tag.low{background:rgba(48,209,88,.12);color:var(--low)}
.history-tag.total{background:rgba(99,99,102,.12);color:var(--text2)}
.history-empty{font-size:13px;color:var(--text2);text-align:center;padding:20px}
</style>
</head>
<body>
<header>
  <div class="brand">&#127905; <span>摩天轮舆情监控</span></div>
  <div class="header-right">
    <span id="clock"></span>
    <span class="status-dot idle" id="statusDot"></span>
    <span id="statusText">待命</span>
  </div>
</header>
<main>
<!-- 上传区 -->
<div id="uploadSection" class="card">
  <div class="upload-zone" id="dropZone">
    <div class="icon">&#128203;</div>
    <div style="font-size:16px;font-weight:500">拖拽 Excel 文件到此处</div>
    <p>或点击选择文件（支持 .xlsx 格式）</p>
    <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none">
  </div>
  <div class="file-info" id="fileInfo"></div>
  <div class="upload-actions" id="uploadActions" style="text-align:center">
    <button class="btn btn-primary" id="startBtn" onclick="startAnalysis()">开始分析</button>
  </div>
  <div class="history-section" id="historySection">
    <h3>&#128340; 历史分析记录</h3>
    <div class="history-list" id="historyList">
      <div class="history-empty">暂无历史记录</div>
    </div>
  </div>
</div>
<!-- 分析中 -->
<div id="analyzeSection" class="card" style="display:none">
  <div class="analyze-wrap">
    <div class="progress-ring">
      <svg width="140" height="140">
        <circle class="bg" cx="70" cy="70" r="62"/>
        <circle class="fg" id="progressCircle" cx="70" cy="70" r="62"
          stroke-dasharray="389.56" stroke-dashoffset="389.56"/>
      </svg>
      <div class="progress-text" id="progressText">0%</div>
    </div>
    <div class="current-title" id="currentTitle">准备中...</div>
    <div style="font-size:13px;color:var(--text2)">
      已完成 <span id="doneCount" style="color:var(--accent);font-family:'JetBrains Mono',monospace">0</span>
      / <span id="totalCount" style="font-family:'JetBrains Mono',monospace">0</span> 条
    </div>
    <div class="log-box" id="logBox"></div>
  </div>
</div>
<!-- 结果区 -->
<div id="resultSection" style="display:none">
  <div class="stats-row" id="statsRow">
    <div class="stat-card"><div class="stat-num" id="statTotal">0</div><div class="stat-label">总笔记数</div></div>
    <div class="stat-card high"><div class="stat-num" id="statHigh">0</div><div class="stat-label">高风险</div></div>
    <div class="stat-card mid"><div class="stat-num" id="statMid">0</div><div class="stat-label">中风险</div></div>
    <div class="stat-card low"><div class="stat-num" id="statLow">0</div><div class="stat-label">低风险</div></div>
    <div class="stat-card"><div class="stat-num" id="statAvgInf">0</div><div class="stat-label">平均影响力</div></div>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr>
        <th>#</th><th>标题</th><th>风险等级</th><th>举报罪名</th>
        <th>影响力</th><th>互动数据</th><th>投诉状态</th>
      </tr></thead>
      <tbody id="resultBody"></tbody>
    </table>
  </div>
  <div class="bottom-bar">
    <button class="btn btn-primary" onclick="exportExcel()">导出 Excel</button>
    <button class="btn btn-outline" onclick="resetAll()">重新分析</button>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const STATUS_LABELS=['待投诉','已投诉','已处理','已驳回'];
const STATUS_CLS=['s0','s1','s2','s3'];
let noteStatuses={};

async function loadNoteStatuses(fid){
  try{
    const res=await fetch(`/status/${fid}`);
    noteStatuses=await res.json();
  }catch(e){noteStatuses={}}
}

async function cycleStatus(btn,fid,idx,e){
  e.stopPropagation();
  const cur=STATUS_LABELS.indexOf(btn.textContent.trim());
  const next=(cur+1)%STATUS_LABELS.length;
  btn.textContent=STATUS_LABELS[next];
  btn.className='status-btn '+STATUS_CLS[next];
  noteStatuses[String(idx)]=STATUS_LABELS[next];
  await fetch(`/status/${fid}/${idx}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:STATUS_LABELS[next]})});
}
const $=id=>document.getElementById(id);

// 时钟
setInterval(()=>{
  $('clock').textContent=new Date().toLocaleString('zh-CN',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
},1000);

// 拖拽上传
const dropZone=$('dropZone'),fileInput=$('fileInput');
dropZone.addEventListener('click',()=>fileInput.click());
dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('dragover')});
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop',e=>{
  e.preventDefault();dropZone.classList.remove('dragover');
  if(e.dataTransfer.files.length)handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change',e=>{if(e.target.files.length)handleFile(e.target.files[0])});

function handleFile(file){
  if(!file.name.match(/\.xlsx?$/i)){showToast('请选择 Excel 文件');return}
  window._selectedFile=file;
  const size=(file.size/1024).toFixed(1);
  $('fileInfo').style.display='block';
  $('fileInfo').textContent=`${file.name} (${size} KB)`;
  $('uploadActions').style.display='block';
}

async function startAnalysis(){
  const file=window._selectedFile;
  if(!file)return;
  $('startBtn').disabled=true;
  $('startBtn').textContent='上传中...';

  const form=new FormData();
  form.append('file',file);
  try{
    const res=await fetch('/upload',{method:'POST',body:form});
    const data=await res.json();
    if(data.error){showToast(data.error);$('startBtn').disabled=false;$('startBtn').textContent='开始分析';return}
    fileId=data.file_id;
    totalNotes=data.total;
    showSection('analyze');
    $('totalCount').textContent=totalNotes;
    runSSE();
  }catch(e){showToast('上传失败');$('startBtn').disabled=false;$('startBtn').textContent='开始分析'}
}

function runSSE(){
  setStatus('running','分析中');
  const es=new EventSource(`/analyze/${fileId}`);
  const circumference=389.56;
  es.onmessage=function(e){
    const d=JSON.parse(e.data);
    if(d.done){
      es.close();setStatus('done','完成');loadResults();loadHistory();return;
    }
    const pct=d.current/d.total;
    $('progressCircle').style.strokeDashoffset=circumference*(1-pct);
    $('progressText').textContent=Math.round(pct*100)+'%';
    $('doneCount').textContent=d.current;
    $('currentTitle').textContent=d.title||'';
    const riskColor={'高风险':'var(--high)','中风险':'var(--mid)','低风险':'var(--low)'}[d.risk_level]||'var(--text2)';
    const log=document.createElement('div');
    log.innerHTML=`[${d.current}/${d.total}] <span style="color:${riskColor}">${d.risk_level}</span> ${d.title}`;
    $('logBox').appendChild(log);
    $('logBox').scrollTop=$('logBox').scrollHeight;
  };
  es.onerror=function(){es.close();showToast('连接中断，尝试加载已有结果');setTimeout(loadResults,1000)};
}

async function loadResults(){
  await loadNoteStatuses(fileId);
  const res=await fetch(`/results/${fileId}`);
  const data=await res.json();
  if(data.error){showToast(data.error);return}
  renderResults(data.results);
  showSection('result');
}

function riskClass(level){
  if(level==='高风险')return'high';if(level==='中风险')return'mid';
  if(level==='低风险')return'low';return'none';
}

function renderResults(results){
  const total=results.length;
  const high=results.filter(r=>r.risk_level==='高风险').length;
  const mid=results.filter(r=>r.risk_level==='中风险').length;
  const low=results.filter(r=>r.risk_level==='低风险').length;
  const avgInf=total?Math.round(results.reduce((s,r)=>s+r.influence_score,0)/total):0;
  const maxInf=Math.max(...results.map(r=>r.influence_score),1);

  $('statTotal').textContent=total;
  $('statHigh').textContent=high;
  $('statMid').textContent=mid;
  $('statLow').textContent=low;
  $('statAvgInf').textContent=avgInf;

  const tbody=$('resultBody');
  tbody.innerHTML='';
  results.forEach((r,i)=>{
    const rc=riskClass(r.risk_level);
    const barW=Math.min(100,Math.round(r.influence_score/maxInf*100));
    const curStatus=noteStatuses[String(r.index)]||'待投诉';
    const si=STATUS_LABELS.indexOf(curStatus)<0?0:STATUS_LABELS.indexOf(curStatus);
    const tr=document.createElement('tr');
    tr.innerHTML=`<td>${i+1}</td>
      <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(r.title)}</td>
      <td><span class="risk-badge ${rc}">${r.risk_level}</span></td>
      <td style="font-size:12px">${esc(r.report_category||'-')}</td>
      <td><div class="influence-bar"><div class="influence-bar-inner" style="width:${barW}%"></div></div>
        <span style="font-family:'JetBrains Mono',monospace;font-size:12px">${r.influence_score}</span></td>
      <td style="font-family:'JetBrains Mono',monospace;font-size:12px">
        &#128077;${r.likes} &#11088;${r.favs} &#128172;${r.comments} &#128257;${r.shares}</td>
      <td><button class="status-btn ${STATUS_CLS[si]}">${STATUS_LABELS[si]}</button></td>`;
    tr.querySelector('.status-btn').addEventListener('click',e=>cycleStatus(tr.querySelector('.status-btn'),fileId,r.index,e));
    tr.onclick=()=>toggleDetail(tr,r);
    tbody.appendChild(tr);
  });
}

function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}

function toggleDetail(tr,r){
  const next=tr.nextElementSibling;
  if(next&&next.classList.contains('detail-row')){
    next.style.display=next.style.display==='none'?'table-row':'none';return;
  }
  const det=document.createElement('tr');
  det.className='detail-row';
  det.style.display='table-row';
  const reportBtn=r.note_url&&r.risk_level!=='无风险'
    ?`<a href="${esc(r.note_url)}" target="_blank" rel="noopener"
        onclick="event.stopPropagation()"
        style="display:inline-block;margin-left:8px;padding:4px 12px;font-size:12px;
               border-radius:4px;background:rgba(255,45,85,.15);color:var(--high);
               border:1px solid rgba(255,45,85,.3);text-decoration:none;cursor:pointer">
        去投诉 ↗</a>`
    :'';
  det.innerHTML=`<td colspan="6"><div class="detail-content">
    <h4>笔记内容</h4><pre>${esc(r.content)}</pre>
    <h4>话题</h4><p>${esc(r.topics)}</p>
    <h4>风险原因</h4><p>${esc(r.risk_reason||'无')}</p>
    <h4>举报文案 <button class="copy-btn" onclick="event.stopPropagation();copyText(this,'${esc(r.report_text||'').replace(/'/g,"\\'")}')">复制</button>${reportBtn}</h4>
    <pre>${esc(r.report_text||'无')}</pre>
  </div></td>`;
  tr.after(det);
}

function copyText(btn,text){
  const el=btn.closest('.detail-content').querySelector('pre:last-child');
  navigator.clipboard.writeText(el.textContent).then(()=>showToast('已复制到剪贴板'));
}

function exportExcel(){
  if(fileId)window.location.href=`/export/${fileId}`;
}

function resetAll(){
  fileId=null;totalNotes=0;window._selectedFile=null;
  $('fileInput').value='';
  $('fileInfo').style.display='none';
  $('uploadActions').style.display='none';
  $('startBtn').disabled=false;
  $('startBtn').textContent='开始分析';
  $('logBox').innerHTML='';
  $('resultBody').innerHTML='';
  $('progressCircle').style.strokeDashoffset='389.56';
  $('progressText').textContent='0%';
  $('doneCount').textContent='0';
  $('totalCount').textContent='0';
  showSection('upload');
  setStatus('idle','待命');
}

function showSection(name){
  $('uploadSection').style.display=name==='upload'?'block':'none';
  $('analyzeSection').style.display=name==='analyze'?'block':'none';
  $('resultSection').style.display=name==='result'?'block':'none';
}

function setStatus(cls,text){
  const dot=$('statusDot');
  dot.className='status-dot '+cls;
  $('statusText').textContent=text;
}

function showToast(msg){
  const t=$('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

// 历史记录
async function loadHistory(){
  try{
    const res=await fetch('/history');
    const list=await res.json();
    const el=$('historyList');
    if(!list.length){el.innerHTML='<div class="history-empty">暂无历史记录</div>';return}
    el.innerHTML='';
    list.forEach(h=>{
      const rc=h.risk_counts||{};
      const item=document.createElement('div');
      item.className='history-item';
      item.innerHTML=`<div class="history-meta">
        <div class="history-name">${esc(h.filename)}</div>
        <div class="history-time">${h.analyzed_at} · ${h.total} 条笔记</div>
      </div><div class="history-tags">
        ${rc['高风险']?`<span class="history-tag high">${rc['高风险']} 高</span>`:''}
        ${rc['中风险']?`<span class="history-tag mid">${rc['中风险']} 中</span>`:''}
        ${rc['低风险']?`<span class="history-tag low">${rc['低风险']} 低</span>`:''}
        <span class="history-tag total">${h.total} 条</span>
      </div>`;
      item.onclick=()=>loadHistoryResult(h.file_id);
      el.appendChild(item);
    });
  }catch(e){}
}

async function loadHistoryResult(fid){
  try{
    fileId=fid;
    await loadNoteStatuses(fid);
    const res=await fetch(`/results/${fid}`);
    const data=await res.json();
    if(data.error){showToast('该记录数据已过期');return}
    renderResults(data.results);
    showSection('result');
    setStatus('done','查看历史');
  }catch(e){showToast('加载失败')}
}

// 页面加载时拉取历史
loadHistory();
</script>
